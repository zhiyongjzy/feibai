<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- 方案6: 印章风 - 红色方印 + 白色"飞"字(中国印章/篆刻风格) -->
  <!-- 红色印章方形(微圆角,模拟手刻不规则边) -->
  <rect x="6" y="6" width="36" height="36" rx="3" ry="3" fill="#c0392b"/>
  <!-- 印章边框(略有磨损) -->
  <rect x="6" y="6" width="36" height="36" rx="3" ry="3" fill="none" stroke="#a93226" stroke-width="1.5"/>
  <!-- 白色"飞"字(篆书简化) -->
  <path d="M 14 14 L 34 14 Q 36 14, 36 16 L 36 30 Q 36 36, 30 38 L 26 40"
        stroke="white" stroke-width="3" fill="none" stroke-linecap="square"/>
  <path d="M 22 14 L 14 26"
        stroke="white" stroke-width="2.8" fill="none" stroke-linecap="square"/>
  <path d="M 28 22 L 16 38"
        stroke="white" stroke-width="2.8" fill="none" stroke-linecap="square"/>
  <!-- 印章做旧(随机小缺口) -->
  <rect x="6" y="20" width="2" height="3" fill="white" opacity="0.3"/>
  <rect x="38" y="30" width="4" height="2" fill="white" opacity="0.2"/>
  <rect x="15" y="40" width="3" height="2" fill="white" opacity="0.25"/>
</svg>
